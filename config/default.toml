# blink — background screenshot daemon
# Default configuration. Copy into ~/.config/blink/config.toml and edit.

[capture]
# Seconds between screenshots. 60 = one frame per minute.
interval_seconds = 60
# "all" captures every connected monitor side-by-side.
# "primary" captures only the primary monitor.
monitors = "all"

[output]
# When dir is empty, defaults to ~/Pictures/blink
# Files are saved as <dir>/YYYY/MM/YYYY_MM_DD_HH_MM_SS.png
dir = ""

[daemon]
# When empty, defaults to ~/.cache/blink/blink.{pid,log}
pid_file = ""
log_file = ""
